<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="importmap">
        {
            "imports": {
                "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
            }
        }
    </script>
</head>

<body>
    <div id="app">
        {{count}}
        <span v-html="html"></span>
        <p v-bind:id="dynamicId"></p>
        <span id="time"></span>
        <button @click="addContent">
            Add Content
        </button>
        <button v-on:click="displayTime">
            Display Time
        </button>
        <!-- <time datetime=""></time> -->
        <button v-on:click="increment">
            Increment Counter
        </button>
        <button @click="count++">
            Another btn to increment the Counter
        </button>
    </div>
    <script type="module">
        import { createApp } from 'vue';
        import MyComponent from './my-component.js';

        createApp(MyComponent).mount('#app');
    </script>
</body>

</html>
