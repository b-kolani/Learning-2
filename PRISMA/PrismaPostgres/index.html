<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1 id="message"></h1>
        <div id="posts"></div>
        <button onclick="addPost()">Add Post</button>
    </div>
    <script>
        const header = document.getElementById('message');
        header.style.fontSize = '30px';
        header.style.fontFamily = "Courier New', Courier, monospace";
        const postsContainer = document.getElementById('posts');
        fetch('http://localhost:3000').then(async (res) => {
            if (!res.ok) {
                console.error("Something went wrong!");
                return;
            }
            const result = await res.json();
            header.innerText = result.message;
        }).catch((e) => {
            console.error(e);
        });
        async function fetchPosts() {
            const response = await fetch('http://localhost:3000/posts');
            if (!response.ok) {
                console.error("Failed to fetch posts");
                return;
            }
            const posts = await response.json().then((data) => data.allPosts);
            for (let i = 0; i < posts.length; i += 1) {
                const p = document.createElement('p');
                p.style.border = "1px solid ";
                p.style.borderRadius = "5px";
                p.style.maxWidth = "300px";
                p.style.maxHeight = "100px";
                p.style.padding = "5px";
                p.innerHTML += /*HTML*/`
                            <strong>Title:</strong> <em>${posts[i].title}</em>
                               <br> 
                            <strong>Content</strong>: <em>${posts[i].content}</em>
                               <br>
                            <strong>Author</strong>: <em>${posts[i].author.name}</em>`;
                postsContainer.appendChild(p);
            }
        }
        fetchPosts();
        async function addPost() {
            const body = {
                name: 'Biman',
                email: 'biman@prisma.io',
                posts: {
                    create: {
                        title: "Post 2",
                        content: 'Post 2 content.'
                    }
                }
            };
            // console.log(JSON.stringify(body));
            try {

                const response = await fetch('http://localhost:3000/post', {
                    method: 'POST',
                    headers: {'content-type': 'application/json'},
                    body: JSON.stringify(body)
                });
                if (!response.ok) {
                    console.error('Failed to add post.');
                    return;
                }
                const result = await response.json();
                console.log(result.message);
            } catch (e) {
                console.error(e);
                return;
            }
        }
    </script>
</body>
</html>
